name: Sync Mihomo to SmartDNS

on:
  schedule:
    # 每天北京时间早上 6 点执行 (UTC 时间 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许你在 Actions 页面手动点击运行按钮

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予创建和覆盖 Release 的权限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Convert Rulesets
        run: |
          cat << 'EOF' > convert.py
          import urllib.request
          import re
          import os

          # 💡 在这里配置你的源链接和对应的输出文件名
          # 后续增加规则，只需要在字典里增加 "文件名": "下载链接" 即可
          SOURCES = {
              "smartdns-proxy.list": "https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/proxy.list",
              # "smartdns-direct.list": "https://example.com/direct.list",
          }

          os.makedirs('output', exist_ok=True)

          for out_name, url in SOURCES.items():
              print(f"正在处理: {url}")
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  response = urllib.request.urlopen(req)
                  lines = response.read().decode('utf-8').splitlines()
                  
                  result = set()
                  for line in lines:
                      # 清理注释和空格
                      line = line.split('#')[0].split('//')[0].strip()
                      if not line:
                          continue
                          
                      # 兼容带有 DOMAIN-SUFFIX, 等标准 Mihomo 规则前缀的情况
                      if ',' in line:
                          parts = [p.strip() for p in line.split(',')]
                          if len(parts) >= 2:
                              rule_type = parts[0].upper()
                              domain = parts[1]
                              if rule_type == 'DOMAIN-SUFFIX':
                                  result.add(domain) # SmartDNS 默认直接写域名就是通配
                              elif rule_type == 'DOMAIN':
                                  result.add(f"-.{domain}") # SmartDNS 仅匹配主域名
                          continue

                      # 处理纯域名列表及图2中的 +. 前缀
                      # Mihomo 中的 +.example.com 意思是匹配主域名和子域名
                      # SmartDNS 中 example.com 就是匹配主域名和子域名，所以直接把 +. 去掉即可
                      line = re.sub(r'^\+\.', '', line)
                      line = re.sub(r'^\.', '', line)
                      
                      if line:
                          result.add(line)
                  
                  # 排序并写入到输出目录
                  with open(f"output/{out_name}", 'w', encoding='utf-8') as f:
                      for domain in sorted(result):
                          f.write(domain + '\n')
                          
                  print(f"✅ 成功生成 {out_name}，包含 {len(result)} 条规则。")
              except Exception as e:
                  print(f"❌ 处理失败 {url}: {e}")

          EOF
          python convert.py

      - name: Generate Update Time
        id: time
        run: |
          # 获取北京时间作为 Release 说明
          echo "TIME_CN=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest # 固定使用 latest 这个 Tag，每次运行都会覆盖它
          name: SmartDNS Domain-Set 规则源
          body: |
            自动从 Mihomo ruleset 转换而来的 SmartDNS domain-set 规则文件。
            
            ⏱ **最后更新时间 (北京时间):** `${{ env.TIME_CN }}`
            
            *此 Release 每天自动运行并覆盖同名文件。订阅链接始终保持不变。*
          files: output/*
          make_latest: true