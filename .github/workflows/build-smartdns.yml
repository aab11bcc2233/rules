name: Build SmartDNS for Debian

on:
  workflow_dispatch: # 允许在 Actions 页面手动点击按钮触发编译

# 必须赋予 GITHUB_TOKEN 读写 Release 资产的权限
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai # 强制统一编译打包的时间戳为北京时间
    # 使用 Debian 13 (Trixie) 容器，提供最新的 OpenSSL 3.5.x 以支持 QUIC (DOQ/H3)
    container: debian:trixie

    steps:
      - name: 预安装环境工具
        run: |
          apt-get update
          apt-get install -y git ca-certificates curl

      - name: 检出当前仓库代码
        uses: actions/checkout@v4

      - name: 安装编译基础依赖
        run: |
          # 容器默认是 root 身份，直接安装所需依赖，并补充 gh 和 jq 用于 release 管理
          apt-get install -y build-essential make gcc g++ fakeroot dpkg-dev libssl-dev jq gh

      - name: 配置 Node.js 环境 (包含 npm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置 Rust 编译环境
        uses: dtolnay/rust-toolchain@stable

      - name: 克隆 SmartDNS 源码
        run: |
          git clone https://github.com/pymumu/smartdns.git

      - name: 执行编译脚本
        run: |
          cd smartdns/package
          chmod +x build-pkg.sh
          ./build-pkg.sh --platform debian --arch amd64 --with-ui

      - name: 查找生成的 .deb 文件
        id: find_deb
        run: |
          DEB_FILE=$(find smartdns/package -name "*.deb" -type f | head -n 1)
          echo "deb_path=${DEB_FILE}" >> $GITHUB_OUTPUT
          echo "打包完成，原始文件路径为: ${DEB_FILE}"

      - name: 管理 Release 资产（滚动保留最新5个）
        id: manage_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="continuous-build"
          
          # 1. 确保固定 Release 存在
          gh release create "$TAG_NAME" --
