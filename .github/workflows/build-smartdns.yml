name: Build SmartDNS for Debian

on:
  workflow_dispatch: # 允许在 Actions 页面手动点击按钮触发编译

# 必须赋予 GITHUB_TOKEN 读写 Release 资产的权限
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest # Ubuntu runner 编译出的 deb 包完全兼容 Debian

    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4

      - name: 安装编译基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make gcc g++ git fakeroot dpkg-dev libssl-dev jq

      - name: 配置 Node.js 环境 (包含 npm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置 Rust 编译环境
        uses: dtolnay/rust-toolchain@stable

      - name: 克隆 SmartDNS 源码
        run: |
          git clone https://github.com/pymumu/smartdns.git

      - name: 执行编译脚本
        run: |
          cd smartdns/package
          chmod +x build-pkg.sh
          ./build-pkg.sh --platform debian --arch amd64 --with-ui

      - name: 查找生成的 .deb 文件
        id: find_deb
        run: |
          DEB_FILE=$(find smartdns/package -name "*.deb" -type f | head -n 1)
          echo "deb_path=${DEB_FILE}" >> $GITHUB_OUTPUT
          echo "打包完成，原始文件路径为: ${DEB_FILE}"

      - name: 管理 Release 资产（滚动保留最新3个）
        id: manage_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="continuous-build"
          
          # 1. 如果固定 Release 不存在，则自动创建它
          gh release create "$TAG_NAME" --title "SmartDNS 持续集成固定版本" --notes "此 Release 内部始终保持最新的 3 个编译包，新包上传时会自动循环删除最旧的版本。" || true
          
          # 2. 修改文件名：在后缀前加入当前运行编号（Run ID），确保文件名在多次运行中唯一
          ORIGINAL_PATH="${{ steps.find_deb.outputs.deb_path }}"
          DEB_DIR=$(dirname "$ORIGINAL_PATH")
          DEB_NAME=$(basename "$ORIGINAL_PATH")
          NEW_NAME="${DEB_NAME%.deb}_run${{ github.run_id }}.deb"
          NEW_PATH="$DEB_DIR/$NEW_NAME"
          mv "$ORIGINAL_PATH" "$NEW_PATH"
          
          echo "deb_final_name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME" >> $GITHUB_OUTPUT
          
          # 3. 检查当前 Release 中已有的资产数量
          ASSETS_JSON=$(gh release view "$TAG_NAME" --json assets)
          COUNT=$(echo "$ASSETS_JSON" | jq '.assets | length')
          echo "当前 Release 中已有文件数量: $COUNT"
          
          # 4. 如果文件数量大于等于 5，循环删除最旧的文件
          while [ "$COUNT" -ge 3 ]; do
            OLDEST_ASSET=$(gh release view "$TAG_NAME" --json assets --jq '.assets | sort_by(.createdAt) | .[0].name')
            echo "检测到文件数达到上限，正在删除最旧的文件: $OLDEST_ASSET"
            gh release delete-asset "$TAG_NAME" "$OLDEST_ASSET" -y
            
            # 重新拉取并更新计数器
            ASSETS_JSON=$(gh release view "$TAG_NAME" --json assets)
            COUNT=$(echo "$ASSETS_JSON" | jq '.assets | length')
          done
          
          # 5. 上传刚刚编译生成的新文件
          echo "正在上传新文件: $NEW_NAME"
          gh release upload "$TAG_NAME" "$NEW_PATH"

      - name: 发送 Telegram 通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *🚀 SmartDNS 滚动编译完成！*
            
            *📊 编译系统*: Debian 13 (trixie) x86_64 兼容包
            *📦 新增文件*: `${{ steps.manage_release.outputs.deb_final_name }}`
            *♻️ 历史清理*: 已自动移出此 Release 中最旧的固件
            *⛓️ 触发人员*: ${{ github.actor }}
            
            🎉 该固定 Release 的文件数已重新平衡并保持在 3 个以内。
            👉 [点击进入固定 Release 列表查看](${{ steps.manage_release.outputs.release_url }})
