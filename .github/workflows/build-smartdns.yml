name: Build SmartDNS for Debian

on:
  workflow_dispatch: # 允许在 Actions 页面手动点击按钮触发编译

# 必须赋予 GITHUB_TOKEN 读写 Release 资产的权限
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai # 强制统一编译打包的时间戳为北京时间，防止版本号倒挂
    # 使用纯净的 Debian 13 (Trixie) 容器，提供最新的 OpenSSL 3.5.x 以完美支持 QUIC (DOQ/H3)
    container: debian:trixie

    steps:
      - name: 预安装环境工具
        run: |
          apt-get update
          # 补充安装基础下载和证书工具，解决 wget / unzip 找不到的报错
          apt-get install -y git ca-certificates curl wget unzip

      - name: 检出当前仓库代码
        uses: actions/checkout@v4

      - name: 配置 Git 安全目录通行证
        # 解决在容器内因为权限归属问题导致 gh 命令调用 git 失败 (dubious ownership) 的报错
        run: git config --global --add safe.directory '*'

      - name: 安装编译基础依赖
        run: |
          # 容器默认是 root 身份，直接安装所需依赖
          # 补充了 gh 和 jq 用于 release 管理
          # 补充了 clang 和 libclang-dev 用于满足 Rust (bindgen) 编译 UI 插件的需求
          apt-get install -y build-essential make gcc g++ fakeroot dpkg-dev libssl-dev jq gh clang libclang-dev

      - name: 配置 Node.js 环境 (包含 npm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置 Rust 编译环境
        uses: dtolnay/rust-toolchain@stable

      - name: 克隆 SmartDNS 源码
        run: |
          git clone https://github.com/pymumu/smartdns.git

      - name: 执行编译脚本
        run: |
          cd smartdns/package
          chmod +x build-pkg.sh
          ./build-pkg.sh --platform debian --arch amd64 --with-ui

      - name: 查找生成的 .deb 文件
        id: find_deb
        run: |
          DEB_FILE=$(find smartdns/package -name "*.deb" -type f | head -n 1)
          echo "deb_path=${DEB_FILE}" >> $GITHUB_OUTPUT
          echo "打包完成，原始文件路径为: ${DEB_FILE}"

      - name: 管理 Release 资产（滚动保留最新5个）
        id: manage_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="continuous-build"
          
          # 1. 智能检查：如果固定 Release 不存在才去创建，存在则直接跳过，防止报错
          if ! gh release view "$TAG_NAME" &>/dev/null; then
            echo "检测到 Release 不存在，正在新建..."
            gh release create "$TAG_NAME" --title "SmartDNS 持续集成固定版本" --notes "此 Release 内部始终保持最新的 5 个编译包，新包上传时会自动循环删除最旧的版本。"
          else
            echo "检测到 Release 已存在，直接使用。"
          fi
          
          # 2. 修改文件名：加入时间戳后缀防止同名覆盖 (例如 _20260619_143000.deb)
          ORIGINAL_PATH="${{ steps.find_deb.outputs.deb_path }}"
          DEB_DIR=$(dirname "$ORIGINAL_PATH")
          DEB_NAME=$(basename "$ORIGINAL_PATH")
          
          CURRENT_TIME=$(date +"%Y%m%d_%H%M%S")
          NEW_NAME="${DEB_NAME%.deb}_${CURRENT_TIME}.deb"
          NEW_PATH="$DEB_DIR/$NEW_NAME"
          mv "$ORIGINAL_PATH" "$NEW_PATH"
          
          echo "deb_final_name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME" >> $GITHUB_OUTPUT
          
          # 3. 精确检查当前 Release 中已有的 .deb 文件数量
          ASSETS_JSON=$(gh release view "$TAG_NAME" --json assets)
          COUNT=$(echo "$ASSETS_JSON" | jq '[.assets[] | select(.name | endswith(".deb"))] | length')
          echo "当前 Release 中已有 .deb 文件数量: $COUNT"
          
          # 4. 如果 .deb 文件数量大于等于 5，循环删除最旧的 .deb 文件
          while [ "$COUNT" -ge 5 ]; do
            OLDEST_ASSET=$(echo "$ASSETS_JSON" | jq -r '[.assets[] | select(.name | endswith(".deb"))] | sort_by(.createdAt) | .[0].name')
            echo "达到上限，正在清理最旧的固件: $OLDEST_ASSET"
            gh release delete-asset "$TAG_NAME" "$OLDEST_ASSET" -y
            
            # 重新拉取并更新计数器
            ASSETS_JSON=$(gh release view "$TAG_NAME" --json assets)
            COUNT=$(echo "$ASSETS_JSON" | jq '[.assets[] | select(.name | endswith(".deb"))] | length')
          done
          
          # 5. 上传刚刚编译生成的新文件
          echo "正在上传新文件: $NEW_NAME"
          gh release upload "$TAG_NAME" "$NEW_PATH"

      - name: 发送 Telegram 通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html
          message: |
            <b>🚀 SmartDNS 滚动编译完成！</b>
            
            <b>📊 编译系统</b>: Debian 13 (trixie) x86_64 兼容包
            <b>📦 新增文件</b>: <code>${{ steps.manage_release.outputs.deb_final_name }}</code>
            <b>♻️ 历史清理</b>: 当文件超出 5 个时，已自动移出最旧的固件
            <b>⛓️ 触发人员</b>: ${{ github.actor }}
            
            🎉 该固定 Release 的文件数已重新平衡并保持在 5 个以内。
            👉 <a href="${{ steps.manage_release.outputs.release_url }}">点击进入固定 Release 列表查看</a>
