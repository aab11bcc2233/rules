name: Build SmartDNS for Debian

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai # 强制使用北京时间，杜绝版本号降级警告
    # 模拟真实机器环境，完美支持 QUIC
    container: debian:trixie

    steps:
      - name: 预安装环境工具
        run: |
          apt-get update
          apt-get install -y git ca-certificates curl wget unzip

      - name: 检出当前仓库代码
        uses: actions/checkout@v4

      - name: 配置 Git 安全目录通行证
        run: git config --global --add safe.directory '*'

      - name: 安装编译基础依赖
        run: |
          apt-get install -y build-essential make gcc g++ fakeroot dpkg-dev libssl-dev jq gh clang libclang-dev

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置 Rust 编译环境
        uses: dtolnay/rust-toolchain@stable

      - name: 克隆 SmartDNS 源码
        run: |
          git clone https://github.com/pymumu/smartdns.git

      - name: 执行编译脚本
        run: |
          cd smartdns/package
          chmod +x build-pkg.sh
          ./build-pkg.sh --platform debian --arch amd64 --with-ui

      - name: 查找生成的 .deb 文件
        id: find_deb
        run: |
          DEB_FILE=$(find smartdns/package -name "*.deb" -type f | head -n 1)
          echo "deb_path=${DEB_FILE}" >> $GITHUB_OUTPUT

      - name: 管理 Release 资产（滚动保留最新5个）
        id: manage_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="continuous-build"
          REPO="${{ github.repository }}"
          
          # 1. 彻底绕过本地 Git 检查，直接通过 API 强行指定仓库查询
          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            echo "检测到 Release 已存在，直接进入文件更新流程。"
          else
            echo "检测到 Release 不存在，正在新建..."
            gh release create "$TAG_NAME" --repo "$REPO" --title "SmartDNS 持续集成固定版本" --notes "内部始终保持最新的 5 个编译包，自动循环清理。" || true
          fi
          
          # 2. 修改文件名：加入时间戳后缀
          ORIGINAL_PATH="${{ steps.find_deb.outputs.deb_path }}"
          DEB_DIR=$(dirname "$ORIGINAL_PATH")
          DEB_NAME=$(basename "$ORIGINAL_PATH")
          
          CURRENT_TIME=$(date +"%Y%m%d_%H%M%S")
          NEW_NAME="${DEB_NAME%.deb}_${CURRENT_TIME}.deb"
          NEW_PATH="$DEB_DIR/$NEW_NAME"
          mv "$ORIGINAL_PATH" "$NEW_PATH"
          
          echo "deb_final_name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "release_url=https://github.com/$REPO/releases/tag/$TAG_NAME" >> $GITHUB_OUTPUT
          
          # 3. 精确清理旧文件逻辑 (全部加上 --repo 强行指定)
          ASSETS_JSON=$(gh release view "$TAG_NAME" --repo "$REPO" --json assets)
          COUNT=$(echo "$ASSETS_JSON" | jq '[.assets[] | select(.name | endswith(".deb"))] | length')
          
          while [ "$COUNT" -ge 5 ]; do
            OLDEST_ASSET=$(echo "$ASSETS_JSON" | jq -r '[.assets[] | select(.name | endswith(".deb"))] | sort_by(.createdAt) | .[0].name')
            gh release delete-asset "$TAG_NAME" "$OLDEST_ASSET" -y --repo "$REPO"
            ASSETS_JSON=$(gh release view "$TAG_NAME" --repo "$REPO" --json assets)
            COUNT=$(echo "$ASSETS_JSON" | jq '[.assets[] | select(.name | endswith(".deb"))] | length')
          done
          
          # 4. 上传时同样强行指定仓库
          gh release upload "$TAG_NAME" "$NEW_PATH" --repo "$REPO"

      - name: 发送 Telegram 通知
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: html # 【修复核心】彻底弃用 Markdown，改为无懈可击的纯 HTML 格式
          message: |
            <b>🚀 SmartDNS 滚动编译完成！</b>
            
            <b>📊 编译系统</b>: Debian 13 (trixie) x86_64
            <b>📦 新增文件</b>: <code>${{ steps.manage_release.outputs.deb_final_name }}</code>
            <b>♻️ 历史清理</b>: 超过 5 个时自动移出旧包
            <b>⛓️ 触发人员</b>: ${{ github.actor }}
            
            👉 <a href="${{ steps.manage_release.outputs.release_url }}">点击进入 Release 列表下载</a>
